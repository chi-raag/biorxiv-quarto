name: CI

on:
  push:
  pull_request:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render template
        run: |
          quarto --version
          quarto typst --version
          quarto render template.qmd --to bioarxiv-typst
          test -f template.pdf
